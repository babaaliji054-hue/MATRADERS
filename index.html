<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MA Traders | Store</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            padding: 0; 
            background-image: url('background.jpg'); 
            background-attachment: fixed;
            background-size: cover;
            background-position: center;
        }

        .overlay {
            background: rgba(0, 0, 0, 0.5); 
            min-height: 100vh;
            padding: 20px;
        }

        /* Side square Header */
        header { 
            background: rgba(26, 37, 47, 0.9);
            color: white;
            width: fit-content;
            padding: 20px 40px;
            margin: 20px 0;
            border-radius: 0 50px 50px 0;
            display: flex;
            align-items: Top of right side;
            gap: 20px;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.3);
        }

        .profile-img { 
            width: 70px;  /* medium size */
            height: 70px; 
            border-radius: 50%; 
            border: 2px solid #3498db; 
            object-fit: cover;
        }

        header h1 { margin: 0; font-size: 1.5rem; letter-spacing: 1px; }

        .container { 
            width: 100%; 
            max-width: 1200px; 
            margin-top: 30px;
        }

        /* Products Grid - Is se icons chote nazar ayenge */
        .product-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); 
            gap: 20px; 
        }

        .card { 
            background: rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(8px);
            padding: 15px; 
            border-radius: 15px; 
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center; 
            color: white;
        }

        .card img { 
            width: 100%; 
            height: 160px; /* Normal size for images */
            object-fit: cover; 
            border-radius: 10px; 
            margin-bottom: 10px; 
        }

        .card h3 { font-size: 1.1rem; margin: 10px 0; }
        .price { color: #2ecc71; font-size: 1.2rem; font-weight: bold; }
        
        .whatsapp-btn { 
            background-color: #25d366; 
            color: white; 
            padding: 8px 18px; 
            text-decoration: none; 
            border-radius: 5px; 
            font-size: 0.9rem;
            display: inline-block;
            margin-top: 10px;
        }

        footer { text-align: center; color: white; padding: 40px; }
    </style>
</head>
<body>

<div class="overlay">
    <header>
        <img src="profile.jpg" alt="Owner" class="profile-img">
        <div>
            <h1>MA TRADERS</h1>
            <small>Quality Jewelry & CCTV</small>
        </div>
    </header>

    <div class="container">
        <div class="product-grid">
            
            <div class="card">
                <img src="jewelry.jpg" alt="Jewelry">
                <h3>Bridal Jewelry</h3>
                <p class="price">Rs. 3,500</p>
                <a href="https://wa.me/923232537675" class="whatsapp-btn">Order Now</a>
            </div>

            <div class="card">
                <img src="cctv.jpg" alt="CCTV">
                <h3>Security Cameras</h3>
                <p class="price">Rs. 15,500</p>
                <a href="https://wa.me/923232537675" class="whatsapp-btn">Inquiry Now</a>
            </div>

            <div class="card">
                <img src="charger.jpg" alt="Charger">
                <h3>Fast Chargers</h3>
                <p class="price">Rs. 1,900</p>
                <a href="https://wa.me/923232537675" class="whatsapp-btn">Buy Now</a>
            </div>

            <div class="card">
                <img src="clothes.jpg" alt="Clothes">
                <h3>Ladies Wear</h3>
                <p class="price">Rs. 12,800</p>
                <a href="https://wa.me/923232537675" class="whatsapp-btn">Order Now</a>
            </div>

        </div>
    </div>

    <footer>
        <p>© 2026 MA Traders | Karachi</p>
    </footer>
</div>

</body>
    </html>
